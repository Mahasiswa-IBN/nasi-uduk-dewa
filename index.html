<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Nasi Uduk Dewa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class='bx bxs-bowl-hot'></i>
                <h2>Uduk Dewa</h2>
            </div>
            
            <ul class="nav-links">
                <li class="active"><a href="index.html"><i class='bx bx-grid-alt'></i> Kasir</a></li>
                <li><a href="dashboard.html"><i class='bx bx-bar-chart-square'></i> Dashboard</a></li>
                <li><a href="products.html"><i class='bx bx-package'></i> Atur Produk</a></li>
            </ul>

            <div class="category-section">
                <h3>Kategori Menu</h3>
                <ul id="category-list" class="category-list">
                    <!-- Categories injected by JS -->
                </ul>
            </div>
        </nav>

        <!-- Main Content (Menu Items) -->
        <main class="main-content">
            <header>
                <div class="search-bar">
                    <i class='bx bx-search'></i>
                    <input type="text" id="search-input" placeholder="Cari menu...">
                </div>
                <div class="user-profile">
                    <div class="avatar"><i class='bx bxs-user'></i></div>
                    <span>Kasir 1</span>
                </div>
            </header>

            <div class="menu-header">
                <h1 id="current-category-title">Semua Menu</h1>
            </div>

            <div class="menu-grid" id="menu-grid">
                <!-- Menu Items injected by JS -->
            </div>
        </main>

        <!-- Right Sidebar (Cart) -->
        <aside class="cart-sidebar">
            <div class="cart-header">
                <h2>Pesanan Saat Ini</h2>
                <span class="order-id">#ORD-0001</span>
            </div>

            <div class="cart-items" id="cart-items">
                <!-- Cart Items injected by JS -->
                <div class="empty-cart-msg">Keranjang kosong</div>
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">Rp 0</span>
                </div>
                <div class="summary-row">
                    <span>Pajak (10%)</span>
                    <span id="tax">Rp 0</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">Rp 0</span>
                </div>

                <div class="customer-info" style="margin-top: 16px;">
                    <label for="customer-name" style="font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 8px;">Nama Pelanggan / Meja</label>
                    <input type="text" id="customer-name" placeholder="Masukkan nama..." style="width: 100%; padding: 12px; border-radius: var(--radius-md); background-color: var(--bg-main); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); font-family: 'Outfit', sans-serif;">
                </div>

                <div class="payment-method">
                    <h3>Metode Pembayaran</h3>
                    <div class="method-buttons">
                        <button class="method-btn active">Tunai</button>
                        <button class="method-btn">QRIS</button>
                        <button class="method-btn">Kartu</button>
                    </div>
                </div>

                <button class="btn-checkout" id="btn-checkout" disabled>
                    Bayar Sekarang <i class='bx bx-right-arrow-alt'></i>
                </button>
            </div>
        </aside>
    </div>

    <!-- Checkout Modal -->
    <div class="modal" id="checkout-modal">
        <div class="modal-content">
            <i class='bx bx-check-circle modal-icon success'></i>
            <h2>Pembayaran Berhasil!</h2>
            <p>Total dibayar: <strong id="modal-total-paid">Rp 0</strong></p>
            <p class="kembalian-text" style="display:none;">Kembalian: <strong id="modal-kembalian">Rp 0</strong></p>
            <div class="modal-actions">
                <button class="btn-print"><i class='bx bx-printer'></i> Cetak Struk</button>
                <button class="btn-close-modal" id="btn-close-modal">Pesanan Baru</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
