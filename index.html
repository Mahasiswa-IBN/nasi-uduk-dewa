<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Nasi Uduk Dewa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class='bx bxs-bowl-hot'></i>
                <h2>Uduk Dewa</h2>
            </div>
            
            <ul class="nav-links">
                <li class="active"><a href="index.html"><i class='bx bx-grid-alt'></i> Kasir</a></li>
                <li><a href="dashboard.html"><i class='bx bx-bar-chart-square'></i> Dashboard</a></li>
                <li><a href="reports.html"><i class='bx bx-calculator'></i> Laporan Pajak</a></li>
                <li><a href="products.html"><i class='bx bx-package'></i> Atur Produk</a></li>
            </ul>

            <div class="category-section">
                <h3>Kategori Menu</h3>
                <ul id="category-list" class="category-list">
                    <!-- Categories injected by JS -->
                </ul>
            </div>
        </nav>

        <!-- Main Content (Menu Items) -->
        <main class="main-content">
            <header>
                <div class="search-bar">
                    <i class='bx bx-search'></i>
                    <input type="text" id="search-input" placeholder="Cari menu...">
                </div>
                <div class="user-profile">
                    <div class="avatar"><i class='bx bxs-user'></i></div>
                    <span>Kasir 1</span>
                </div>
            </header>

            <div class="menu-header">
                <h1 id="current-category-title">Semua Menu</h1>
            </div>

            <!-- Mobile Categories Scroll -->
            <div class="mobile-categories-wrapper">
                <ul id="mobile-category-list" class="mobile-category-scroll">
                    <!-- Injected by JS -->
                </ul>
            </div>

            <div class="menu-grid" id="menu-grid">
                <!-- Menu Items injected by JS -->
            </div>
        </main>

        <!-- Right Sidebar (Cart) -->
        <aside class="cart-sidebar">
            <div class="cart-header">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button id="btn-close-cart" style="display: none; background: transparent; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; display: flex; align-items: center; padding: 0;"><i class='bx bx-chevron-left'></i></button>
                    <h2>Pesanan Saat Ini</h2>
                </div>
                <span class="order-id">#ORD-0001</span>
            </div>

            <div class="cart-items" id="cart-items">
                <!-- Cart Items injected by JS -->
                <div class="empty-cart-msg">Keranjang kosong</div>
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">Rp 0</span>
                </div>
                <div class="summary-row">
                    <span>Pajak (10%)</span>
                    <span id="tax">Rp 0</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">Rp 0</span>
                </div>

                <div class="customer-info" style="margin-top: 16px;">
                    <label for="customer-name" style="font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 8px;">Nama Pelanggan / Meja</label>
                    <input type="text" id="customer-name" placeholder="Masukkan nama..." style="width: 100%; padding: 12px; border-radius: var(--radius-md); background-color: var(--bg-main); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); font-family: 'Outfit', sans-serif;">
                </div>

                <div class="payment-method">
                    <h3>Metode Pembayaran</h3>
                    <div class="method-buttons">
                        <button class="method-btn active">Tunai</button>
                        <button class="method-btn">QRIS</button>
                        <button class="method-btn">Kartu</button>
                    </div>
                </div>

                <button class="btn-checkout" id="btn-checkout" disabled>
                    Bayar Sekarang <i class='bx bx-right-arrow-alt'></i>
                </button>
            </div>
        </aside>

        <!-- Floating Cart Button for Mobile -->
        <button class="btn-floating-cart" id="btn-toggle-cart">
            <i class='bx bx-shopping-bag'></i>
            <span class="cart-badge" id="mobile-cart-badge">0</span>
        </button>
    </div>

    <!-- Bottom Navigation for Mobile -->
    <div class="bottom-nav">
        <a href="index.html" class="active"><i class='bx bx-grid-alt'></i><span>Kasir</span></a>
        <a href="dashboard.html"><i class='bx bx-bar-chart-square'></i><span>Dashboard</span></a>
        <a href="reports.html"><i class='bx bx-calculator'></i><span>Pajak</span></a>
        <a href="products.html"><i class='bx bx-package'></i><span>Produk</span></a>
    </div>

    <!-- Checkout Modal -->
    <div class="modal" id="checkout-modal">
        <div class="modal-content" style="width: 420px; padding: 30px;">
            <i class='bx bx-check-circle modal-icon success' style="font-size: 56px; margin-bottom: 12px;"></i>
            <h2 style="font-size: 22px; margin-bottom: 8px;">Pembayaran Berhasil!</h2>
            <p style="font-size: 14px; margin-bottom: 16px;">Total dibayar: <strong id="modal-total-paid" style="font-size: 16px; color: var(--accent-primary);">Rp 0</strong></p>
            
            <!-- Receipt Preview Container -->
            <div id="checkout-receipt-preview" style="background: white; color: #000; padding: 16px; border-radius: var(--radius-sm); font-family: 'Courier New', Courier, monospace; font-size: 12px; line-height: 1.4; text-align: left; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; max-height: 280px; overflow-y: auto;">
                <!-- Filled via JS -->
            </div>

            <div class="modal-actions" style="margin-top: 0; display: flex; flex-direction: row; gap: 12px;">
                <button class="btn-print" id="btn-print" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Outfit', sans-serif;"><i class='bx bx-printer'></i> Cetak Struk</button>
                <button class="btn-close-modal" id="btn-close-modal" style="flex: 1; font-family: 'Outfit', sans-serif; background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.1);">Pesanan Baru</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
